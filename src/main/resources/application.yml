spring:
  application:
    name: docflow-lite
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/docflow}
    username: ${DB_USERNAME:docflow}
    password: ${DB_PASSWORD:docflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: ${APP_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    url: /api-docs
    operations-sorter: method
    tags-sorter: alpha

docflow:
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
  jwt:
    secret: ${JWT_SECRET:ZG9jZmxvdy1saXRlLXN1cGVyLXNlY3JldC1rZXktZm9yLWRldi1vbmx5LTEyMzQ1Njc4OTA=}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
    refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:604800}
