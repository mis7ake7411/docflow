services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docflow-app
    ports:
      - "${APP_PORT}:8080"
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_PORT: 8080
      UPLOAD_DIR: ${UPLOAD_DIR}
    depends_on:
      - postgres
      - redis
    volumes:
      # 使用主機 bind mount，確保重新部署後檔案不會消失
      # 首次部署前需在主機執行：sudo mkdir -p /data/docflow/uploads
      - ${UPLOAD_HOST_DIR:-/data/docflow/uploads}:${UPLOAD_DIR}

  postgres:
    image: postgres:16-alpine
    container_name: docflow-postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: docflow-redis
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  postgres-data:
  # uploaded-files 已改為 bind mount，不再需要 named volume
  # 若需回復請取消下行註解並還原 app.volumes 設定
  # uploaded-files:
