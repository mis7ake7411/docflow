name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    - name: Cache Maven local repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build with Maven
      run: mvn -B -DskipTests package

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/docflow:${{ github.sha }}
          ghcr.io/${{ github.repository_owner }}/docflow:latest

    - name: Trigger Zeabur redeploy (optional)
      if: env.ZEABUR_TOKEN != '' && secrets.ZEABUR_TOKEN
      env:
        ZEABUR_TOKEN: ${{ secrets.ZEABUR_TOKEN }}
      run: |
        echo "Triggering Zeabur redeploy..."
        curl -s -X POST \
          -H "Authorization: Bearer $ZEABUR_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"action":"redeploy","reason":"CI image update"}' \
          https://api.zeabur.com/v1/apps/REPLACE_WITH_APP_ID/deployments || true

  notify:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Notify
        run: echo "Build and push finished. Image: ghcr.io/${{ github.repository_owner }}/docflow:latest"
